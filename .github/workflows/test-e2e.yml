name: E2E Tests

on: pull_request

jobs:
  test-e2e:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '~1.24'

      - name: Install the latest version of kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      - name: Verify kind installation
        run: kind version

      - name: Create kind cluster with registry
        run: ./scripts/kind-docker.sh

      - name: Wait for cluster to be ready
        run: kubectl wait --for=condition=Ready nodes --all --timeout=300s

      - name: Build and load operator image
        run: |
          make docker-build IMG=example.com/devcontainer:v0.0.1
          kind load docker-image example.com/devcontainer:v0.0.1

      - name: Build and load utility images
        run: make load-utilities-via-kind

      - name: Install CRDs
        run: make install

      - name: Deploy operator
        run: |
          make manifests
          cd config/manager && ../../bin/kustomize edit set image controller=example.com/devcontainer:v0.0.1
          cd ../.. && bin/kustomize build config/default | kubectl apply --server-side -f -

      - name: Wait for operator to be ready
        run: kubectl wait --for=condition=Available deployment/devcontainer-controller-manager -n devcontainer-operator --timeout=300s

      - name: Running Test e2e
        run: |
          go mod tidy
          make test-e2e
